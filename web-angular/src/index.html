<!doctype html>
<!-- data-theme: paleta por defecto; el ThemeSwitcher la cambia en runtime. -->
<html lang="es" data-theme="azul">
<head>
  <meta charset="utf-8">
  <title>Traición en la Oficina</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#0f172a">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Fuentes editoriales para la pantalla Final ("Circular Oficial").
       Preconnect para reducir latencia DNS+TLS antes del fetch de fonts.
       Fraunces — serif display con personalidad (ejes wonk/soft); rompe
       con el system-ui del shell genérico. JetBrains Mono — body mono
       que sostiene la sensación de "documento procesado por sistema". -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=JetBrains+Mono:wght@400;500;700&display=swap">
</head>
<body>
  <app-root></app-root>
</body>
</html>
