<div class="screen">
  <div class="content">
    <div class="logo">S</div>
    <h1 class="center">
      SINERGIA <span style="color:var(--accent)">CORP</span>
    </h1>
    <p class="center">Acceso de personal · Traición en la Oficina</p>

    <div style="height:14px"></div>

    <!-- Selector de modo. [class.on] marca el botón activo. -->
    <div class="seg">
      <button [class.on]="modo() === 'crear'" (click)="modo.set('crear')">
        Crear sala
      </button>
      <button [class.on]="modo() === 'unirse'" (click)="modo.set('unirse')">
        Unirse
      </button>
    </div>

    @if (error()) {
      <div class="error">{{ error() }}</div>
    }

    @if (modo() === 'unirse') {
      <div class="field">
        <label for="code-input">Código de sala</label>
        <input
          id="code-input"
          class="code"
          type="text"
          maxlength="5"
          inputmode="text"
          autocomplete="off"
          autocapitalize="characters"
          spellcheck="false"
          placeholder="ABCDE"
          [ngModel]="code()"
          (ngModelChange)="setCode($event)"
        />
      </div>
    } @else {
      <div class="field">
        <label for="company-input">Empresa (opcional)</label>
        <input
          id="company-input"
          type="text"
          maxlength="30"
          autocomplete="organization"
          spellcheck="false"
          placeholder="Sinergia Corp"
          [ngModel]="companyName()"
          (ngModelChange)="companyName.set($event)"
        />
      </div>
    }

    <div class="field">
      <label for="nickname-input">Tu apodo</label>
      <input
        id="nickname-input"
        type="text"
        maxlength="20"
        autocomplete="nickname"
        spellcheck="false"
        placeholder="Cómo te ven los demás"
        [ngModel]="nickname()"
        (ngModelChange)="nickname.set($event)"
      />
    </div>

    <!-- Selección de avatar: el botón abre el modal pantalla-completa.
         aria-labelledby asocia el label visible para screen readers. -->
    <div class="field">
      <label id="lbl-identidad">Tu identidad</label>
      <button
        class="avatar-current"
        type="button"
        aria-labelledby="lbl-identidad"
        (click)="abrirPicker()"
      >
        <app-avatar [id]="avatar()" [size]="96" />
        <span class="avatar-current-info">
          <strong>{{ puestoActual() }}</strong>
          <span>Tocá para cambiar</span>
        </span>
      </button>
    </div>

    @if (servidorUrl) {
      <p class="muted-note">Servidor: {{ servidorUrl }}</p>
    }
  </div>

  <div class="actionbar">
    <button class="btn" [disabled]="!puede() || cargando()" (click)="enviar()">
      @if (cargando()) {
        Conectando…
      } @else if (modo() === 'crear') {
        CREAR SALA
      } @else {
        INGRESAR
      }
    </button>
  </div>

  <!-- Modal pantalla-completa. Solo se monta cuando pickerAbierto() es true.
       (pick) recibe el id elegido; (close) se dispara al cancelar. -->
  @if (pickerAbierto()) {
    <app-avatar-picker
      [currentId]="avatar()"
      (pick)="seleccionarAvatar($event)"
      (close)="cerrarPicker()"
    />
  }
</div>
