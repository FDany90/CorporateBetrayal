<!-- Backdrop: ocupa toda la ventana, oscurece el fondo. Tap = cerrar.
     stopPropagation en el modal evita que un click adentro burbuje a acá.
     role="dialog" + aria-modal hace que los screen readers anuncien el
     modal como tal. aria-labelledby apunta al h2 del título. -->
<div class="picker-backdrop" (click)="cancelar()">
  <div
    class="picker-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="picker-title"
    (click)="$event.stopPropagation()"
  >

    <header class="picker-head">
      <div>
        <p class="picker-kicker">Asignación de identidad</p>
        <h2 id="picker-title" class="picker-title">¿Quién sos?</h2>
      </div>
      <button
        class="picker-close"
        type="button"
        aria-label="Cerrar selección de avatar"
        title="Cerrar"
        (click)="cancelar()"
      >✕</button>
    </header>

    <!-- Preview grande de la selección actual: avatar enorme + puesto. -->
    <div class="picker-preview">
      <app-avatar [id]="seleccion()" [size]="112" />
      <div class="picker-preview-info">
        <strong>{{ info.puesto || '—' }}</strong>
        <span>Departamento: {{ info.dept || '—' }}</span>
      </div>
    </div>

    <!-- Grilla 4 columnas con los 16 avatars. Tocar uno actualiza
         la selección temporal (no cierra todavía). -->
    <div class="picker-body">
      <div class="picker-grid">
        @for (a of avatares; track a.id) {
          <button
            class="picker-cell"
            type="button"
            [class.on]="seleccion() === a.id"
            [attr.aria-label]="a.puesto"
            [attr.aria-pressed]="seleccion() === a.id"
            [title]="a.puesto"
            (click)="elegir(a.id)"
          >
            <app-avatar [id]="a.id" [size]="70" />
          </button>
        }
      </div>
    </div>

    <footer class="picker-foot">
      <button class="btn" (click)="confirmar()">LISTO</button>
    </footer>
  </div>
</div>
