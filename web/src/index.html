<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Traición en la Oficina</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <!-- theme-color: papel crema del shell (paleta editorial). El chrome del
       browser en mobile va a tomar este color, combinando con el juego. -->
  <meta name="theme-color" content="#f5efe4">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Fuentes editoriales para la pantalla Final ("Circular Oficial").
       Preconnect para reducir latencia DNS+TLS antes del fetch de fonts.
       Fraunces — serif display con personalidad (ejes wonk/soft); rompe
       con el system-ui del shell genérico. JetBrains Mono — body mono
       que sostiene la sensación de "documento procesado por sistema". -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=JetBrains+Mono:wght@400;500;700&family=Caveat:wght@500;700&display=swap">
</head>

</body>
</html>
